<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEL/RUB Конвертер</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GEL/RUB">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23c41e3a' width='180' height='180'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='80' font-weight='bold' fill='white' font-family='system-ui'>₾</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            text-align: center;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 12px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .button {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .button:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .loading {
            display: none;
            margin-bottom: 20px;
        }

        .spinner {
            border: 3px solid #f0f0f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">₾💱</div>
        <h1>GEL/RUB Конвертер</h1>
        <p>Открываем конвертер в Яндекс-браузере...</p>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>

        <button class="button" id="fallbackButton" style="display: none;">
            Открыть конвертер
        </button>

        <p class="status" id="status"></p>
    </div>

    <script>
        const converterUrl = 'https://makmakm734-spec.github.io/tools/converter.html';
        const yandexUrl = 'yandexbrowser://' + converterUrl.replace('https://', '');

        // Показываем загрузку
        document.getElementById('loading').style.display = 'block';
        document.getElementById('status').textContent = 'Ожидание...';

        // Попытка открыть в Яндекс-браузере
        function openInYandex() {
            // Пытаемся открыть через URL-схему Яндекса
            window.location.href = yandexUrl;

            // Если не откроется, через 2 секунды показываем фолбэк кнопку
            setTimeout(function() {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('fallbackButton').style.display = 'inline-block';
                document.getElementById('status').textContent = 'Яндекс-браузер не установлен?';
            }, 2000);
        }

        // Фолбэк кнопка — открывает конвертер в текущем браузере
        document.getElementById('fallbackButton').addEventListener('click', function() {
            window.location.href = converterUrl;
        });

        // Запускаем при загрузке страницы
        window.addEventListener('load', function() {
            openInYandex();
        });

        // На случай, если юзер вернулся на эту страницу
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                openInYandex();
            }
        });
    </script>
</body>
</html>
